# Zond example config — copy to `zond.yml` (or `zond.yaml`)
# and mount or place at a path the running container can read.
#
# Default resolution order:
#   1. $ZOND_CONFIG_PATH env var        (path to this file)
#   2. ./zond.yml in working directory  (falls back to ./zond.yaml)
#
# In the official container image the working directory is /app, so the
# volume mount path /app/zond.yml maps to this file.

port: 8080

targets:
  - name: metube
    url: http://hl-metube:8081/
  - name: ollama
    url: http://hl-ollama:11434/api/tags
    timeout: 10000  # ms, default 5000
  - name: grafana
    url: http://hl-grafana:3000/api/health
    timeout: 3000
