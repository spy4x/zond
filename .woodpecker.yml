steps:
  check:
    image: golang:1.25-alpine
    when:
      event: [push, pull_request, tag]
    commands:
      - go version
      - go mod verify
      - go vet ./...
      - gofmt -l .
      # gcc/musl-dev needed for -race (cgo required)
      - apk add --no-cache gcc musl-dev
      - go test -race -count=1 ./...
      - go build ./...